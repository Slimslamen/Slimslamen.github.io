<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Lumanosimo&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header class="startHeader text d-flex justify-content-center align-items-center">
        <div class="headerText text">
            <h1 id="startText">Welcome to
                <div class="d-flex align-items-center justify-content-between">
                    <span>R</span><span>P</span><span>S</span>
                </div>
            </h1>
        </div>
    </header>
    <main>
        <div class="signForm">
            <form id="signUp" >
                <label for="username" id="usernameText">Username:</label><br>
                <input type="text" name="username" id="username" required><br>
                     <div class="characterStyle mt-5">
                        <h2 id="characterText">Choose your character:</h2>
                            <div class="images d-flex flex-row justify-content-between align-items-center">
                                <input id="Morty" type="checkbox" name="Morty" value="Morty"><label for="Morty"></label>
                                <input id="Rick" type="checkbox" name="Rick" value="Rick"><label for="Rick"></label>
                                <input id="EvilMorty" type="checkbox" name="EvilMorty" value="EvilMorty"><label for="EvilMorty"></label>
                            </div>
                    </div>
                <button type="submit" id="submit">Start</button>
            </form>
        </div>
    </main>
</body>
</html>
