<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Lumanosimo&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="game.js" defer></script>
    <title>Game</title>
</head>
<body>
    <header class="gameHeader text d-flex justify-content-center align-items-center">
            <h1 class="handText">Choose your hand!</h1>
    </header>
    <main>
            <div class="gameOn specialClasses d-flex align-items-center flex-column">
                <div class="handsDiv d-flex align-items-center flex-row">
                    <button class="hands rock mx-4">✊</button>
                    <button class="hands paper mx-4">🖐️</button>
                    <button class="hands scissors mx-4">✌️</button>
                </div>
                    <div class="chosenMe d-flex justify-content-around mt-5">
                        <div class="mx-5">
                            <h2 id="userName"></h2>
                            <img class="yourCharacter" src="" width="130px">
                            <span class="userScore">0</span>
                        </div>
                        <div class="iRobot mx-5">
                            <h2 id="computer"></h2>
                            <img id="squanchy" src="images/squanchy-removebg-preview.png" alt="rick" width="230px">
                            <span class="computerScore">0</span>
                        </div>
                    </div>            
            </div>
            <h1 id="drawText">Draaaaw</h1>
    </main>
</body>
</html>
