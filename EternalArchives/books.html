<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Books</title>
		<link rel="stylesheet" href="books.css" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
			crossorigin="anonymous"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css"
		/>
		<script src="displayItems.js" defer></script>
	</head>
	<body>
		<header>
			<nav class="navbar navbar-expand justify-content-around">
				<ul class="nav navbar-nav">
					<form id="search-navbar" action="books.html" method="get">
						<input
							type="search"
							class="form-control"
							id="searchInput"
							placeholder="Search"
							aria-label="Search"
							aria-describedby="search-addon"
						/><span id="search-btn">
							<i class="bi bi-search"></i>
						</span>
					</form>
				</ul>
				<ul
					id="main-navbar"
					class="nav navbar-nav justify-content-center align-items-center"
				>
					<li class="nav-item">
						<a
							id="first-list-item"
							class="nav-link active text-white"
							href="./index.html"
							aria-current="page"
							target="_blank"
							>Home <span class="visually-hidden">(current)</span></a
						>
					</li>
					<li class="nav-item">
						<a class="nav-link text-white" href="wishlist.html" target="_blank"
							><i class="bi bi-heart"></i
							><span class="badge text-bg-transparent" id="counter">0</span></a
						>
					</li>
				</ul>
			</nav>
		</header>
		<main class="grid-container">
			<ul id="searchResult"></ul>
		</main>
		<footer class="d-flex align-items-center justify-content-center">
			<form id="addBookForm" action="" class="form d-flex flex-column">
				<label for="name">Title:</label>
				<input type="name" placeholder="Harry Potter" id="name" />

				<label for="genre">Genre:</label>
				<input type="text" placeholder="Fantasy" id="genre" />

				<label for="year">Year:</label>
				<input type="number" placeholder="1997" id="year" />

				<label for="image">Cover:</label>
				<input type="url" placeholder="https://www.google.com" id="url" />

				<label for="text">Description:</label>
				<textarea
					name=""
					id="about"
					cols="30"
					rows="10"
					placeholder="Write a short description about the book?"
				></textarea>
				<button type="submit" id="add">Add book</button>
			</form>
		</footer>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
			crossorigin="anonymous"
		></script>
		<script
			src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
			integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
			crossorigin="anonymous"
		></script>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
			integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
			crossorigin="anonymous"
		></script>
	</body>
</html>
